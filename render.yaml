services:
  - type: web
    name: wcc-platform
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn wcc_platform.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: wcc-platform-db
          property: connectionString

databases:
  - name: wcc-platform-db
    plan: free
